<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In — OAuth2 Server</title>
    <link rel="stylesheet" th:href="@{/css/login.css}"/>
</head>
<body>

<div class="page-wrapper">
    <div class="login-card">

        <!-- Header -->
        <div class="card-header">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to continue to the OAuth2 Demo</p>
        </div>

        <!-- Error banner -->
        <div class="alert alert-error" th:if="${param.error}">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd"
                      d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                      clip-rule="evenodd"/>
            </svg>
            <span>Invalid username or password. Please try again.</span>
        </div>

        <!-- Logout success banner -->
        <div class="alert alert-success" th:if="${param.logout}">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd"
                      d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                      clip-rule="evenodd"/>
            </svg>
            <span>You have been signed out successfully.</span>
        </div>

        <!-- Login form -->
        <!--
            th:action="@{/login}" causes Thymeleaf to automatically append the CSRF
            token as a query parameter when the CsrfRequestDataValueProcessor is active.
            We also embed it as a hidden field for belt-and-suspenders safety.
        -->
        <form th:action="@{/login}" method="post" class="login-form" autocomplete="off">

            <!-- CSRF hidden field — Thymeleaf resolves _csrf from the request attribute
                 set by CsrfTokenRequestAttributeHandler in the security config.        -->
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Enter your username"
                        required
                        autofocus
                        th:value="${param.username}"/>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        required/>
                    <button type="button" class="toggle-password" onclick="togglePassword(this)"
                            aria-label="Toggle password visibility">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                Sign In
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"/>
                    <polyline points="12 5 19 12 12 19"/>
                </svg>
            </button>
        </form>

        <!-- Demo hint -->
        <div class="demo-hint">
            <p class="hint-title">Demo Credentials</p>
            <div class="hint-row">
                <span class="hint-role">Admin</span>
                <code>admin</code> / <code>Admin@1234</code>
            </div>
            <div class="hint-row">
                <span class="hint-role">User</span>
                <code>john</code> / <code>User@1234</code>
            </div>
        </div>

        <!-- Footer -->
        <p class="card-footer">
            Secured by
            <span class="brand">Spring Authorization Server</span>
            &middot; OAuth 2.0 + PKCE
        </p>

    </div>
</div>

<script>
    function togglePassword(btn) {
        const input = btn.closest('.input-wrapper').querySelector('input');
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        btn.querySelector('svg').style.opacity = isHidden ? '1' : '0.4';
    }
</script>

</body>
</html>
